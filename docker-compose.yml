services:
  browser-demo:
    image: jlesage/firefox:latest
    container_name: buttervms-browser-demo
    restart: unless-stopped
    ports:
      - "6080:5800"
      - "5901:5900"
    environment:
      KEEP_APP_RUNNING: "1"
      DISPLAY_WIDTH: "1440"
      DISPLAY_HEIGHT: "900"
      VNC_PASSWORD: "buttervms"
      USER_ID: "1000"
      GROUP_ID: "1000"

  buttervms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buttervms-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BUTTERVMS_DEBUG: "0"
      BUTTERVMS_DB_PATH: "/data/buttervms.db"
      BUTTERVMS_VNC_IMAGE: "jlesage/firefox:latest"
      BUTTERVMS_CONTAINER_PREFIX: "buttervms-session"
      BUTTERVMS_DEMO_BROWSER_URL: "http://127.0.0.1:6080"
      BUTTERVMS_ENABLE_ADMIN: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - buttervms_data:/data

volumes:
  buttervms_data:
