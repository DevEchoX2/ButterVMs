<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ButterVMS Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="page">
      <section class="result-card reveal">
        <p class="pill">Admin</p>
        <h1>ButterVMS Admin</h1>
        <p>Login to manage sessions, stop VMs, and review live ports.</p>

        {% if error %}
        <div class="btc-box">
          <p>{{ error }}</p>
        </div>
        {% endif %}

        <form action="/admin/login" method="post">
          <label for="password">Admin password</label>
          <input id="password" name="password" type="password" placeholder="enter admin password" required />
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
  </body>
</html>
